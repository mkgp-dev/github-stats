name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Generate images
      run: |
        node --version
        npm run generate
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        GITHUB_ACTOR: ${{ secrets.GH_STATS_ACTOR }}
        REPO_SCOPE: ${{ secrets.REPO_SCOPE || 'owned' }}
        LANG_SCOPE: ${{ secrets.LANG_SCOPE || 'owned_plus_contributed' }}
        ENABLE_LINES_CHANGED: ${{ secrets.ENABLE_LINES_CHANGED || 'false' }}
        LINES_CHANGED_MAX_REPOS: ${{ secrets.LINES_CHANGED_MAX_REPOS }}
        LINES_CHANGED_TIMEOUT_MS: ${{ secrets.LINES_CHANGED_TIMEOUT_MS }}
        LINES_CHANGED_MODULE_BUDGET_MS: ${{ secrets.LINES_CHANGED_MODULE_BUDGET_MS }}
        LINES_CHANGED_MAX_RETRIES: ${{ secrets.LINES_CHANGED_MAX_RETRIES }}
        EXCLUDED_REPOS: ${{ secrets.EXCLUDED_REPOS }}
        EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}

    - name: Commit to the output branch of repo
      run: |
        set -euo pipefail

        artifact_dir="$RUNNER_TEMP/github-stats-output"
        rm -rf "$artifact_dir"
        mkdir -p "$artifact_dir"
        cp -R generated "$artifact_dir/generated"
        cp result.json "$artifact_dir/result.json"

        git config --global user.name "github-stats[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        if git checkout output 2>/dev/null; then
          git rm -rf generated result.json 2>/dev/null || true
          rm -rf generated result.json
        else
          git checkout --orphan output
          git rm -rf . 2>/dev/null || true
        fi

        cp -R "$RUNNER_TEMP/github-stats-output/generated" "./generated"
        cp "$RUNNER_TEMP/github-stats-output/result.json" "result.json"

        if [ ! -f README.md ]; then
          cat > README.md <<EOF
# Output

## Overview

Copy this snippet for your overview card:

\`\`\`md
![GitHub Stats Overview](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/output/generated/overview.svg)
\`\`\`

## Languages

Copy this snippet for your languages card:

\`\`\`md
![Most Used Languages](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/output/generated/languages.svg)
\`\`\`

<sub>You can check your logs <a href="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/output/result.json">here</a>.</sub>
EOF
        fi

        git add generated result.json README.md
        git commit -m 'Update generated files' || true
        git push origin output -f
