name: Generate Stats Images

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Generate images
      run: |
        node --version
        npm run generate
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        GITHUB_ACTOR: ${{ secrets.GH_STATS_ACTOR }}
        REPO_SCOPE: ${{ secrets.REPO_SCOPE }}
        LANG_SCOPE: ${{ secrets.LANG_SCOPE }}
        ENABLE_LINES_CHANGED: ${{ secrets.ENABLE_LINES_CHANGED }}
        LINES_CHANGED_MAX_REPOS: ${{ secrets.LINES_CHANGED_MAX_REPOS }}
        LINES_CHANGED_TIMEOUT_MS: ${{ secrets.LINES_CHANGED_TIMEOUT_MS }}
        LINES_CHANGED_MODULE_BUDGET_MS: ${{ secrets.LINES_CHANGED_MODULE_BUDGET_MS }}
        LINES_CHANGED_MAX_RETRIES: ${{ secrets.LINES_CHANGED_MAX_RETRIES }}
        EXCLUDED_REPOS: ${{ secrets.EXCLUDED_REPOS }}
        EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}

    - name: Commit to the output branch of repo
      run: |
        git config --global user.name "github-stats[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m 'temp commit' || echo
        git checkout output 2>/dev/null || git checkout --orphan output && git rm -rf . && git checkout main -- generated/
        git commit -m 'Update generated files' || echo
        git push origin output -f
